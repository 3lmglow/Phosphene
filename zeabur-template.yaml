apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Phosphene
spec:
  description: A private task, reward, and companionship space for one user and one AI.
  icon: https://raw.githubusercontent.com/3lmglow/Phosphene/main/public/favicon.svg
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Phosphene domain
      description: Choose the private web domain for this Phosphene instance.
    - key: PHOSPHENE_SETUP_TOKEN
      type: STRING
      name: Optional setup protection
      description: Leave blank for first-visitor setup, or enter a long private value to protect claiming.
    - key: PHOSPHENE_TIMEZONE
      type: STRING
      name: Timezone
      description: IANA timezone used for daily streaks, for example Asia/Shanghai.
  tags:
    - Tool
    - AI
  readme: |-
    # Phosphene

    This template deploys one private application and one persistent `/data` volume. Open the
    assigned domain and complete the one-time setup. Save the AI token shown after setup, then
    connect your AI client to `https://YOUR_DOMAIN/mcp` with
    `Authorization: Bearer YOUR_AI_TOKEN`.
  services:
    - name: phosphene
      icon: https://raw.githubusercontent.com/3lmglow/Phosphene/main/public/favicon.svg
      template: PREBUILT
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: ghcr.io/3lmglow/phosphene:latest
        ports:
          - id: web
            port: 8080
            type: HTTP
        volumes:
          - id: data
            dir: /data
        env:
          NODE_ENV:
            default: production
          PORT:
            default: "8080"
          PUBLIC_URL:
            default: https://${PUBLIC_DOMAIN}
          PHOSPHENE_SETUP_TOKEN:
            default: ${PHOSPHENE_SETUP_TOKEN}
          PHOSPHENE_MCP_AUTH_MODE:
            default: token
          PHOSPHENE_TIMEZONE:
            default: ${PHOSPHENE_TIMEZONE}
        instructions:
          - type: DOMAIN
            title: Open Phosphene
            content: ${PUBLIC_DOMAIN}
          - type: TEXT
            title: MCP endpoint
            content: https://${PUBLIC_DOMAIN}/mcp
  localization:
    zh-CN:
      description: 一位 user 与一位 AI 的私人任务、积分、奖励与陪伴空间。
      variables:
        - key: PUBLIC_DOMAIN
          type: DOMAIN
          name: Phosphene 域名
          description: 为你的私人网站选择域名。
        - key: PHOSPHENE_SETUP_TOKEN
          type: STRING
          name: 可选的首次设置保护
          description: 留空则由首位访问者认领；也可填写一段较长的私密字符串保护认领过程。
        - key: PHOSPHENE_TIMEZONE
          type: STRING
          name: 时区
          description: 连击按此自然日结算，例如 Asia/Shanghai。
