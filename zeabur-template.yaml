apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: Phosphene
spec:
  description: A private task, points, rewards, and companionship space for one user and one AI.
  icon: https://raw.githubusercontent.com/Obedience-Community/phosphene/main/public/favicon.svg
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Phosphene domain
      description: Choose the private web domain for this Phosphene instance.
    - key: PHOSPHENE_SETUP_TOKEN
      type: STRING
      name: One-time setup token
      description: Use a long random value. It is required only on the first setup screen.
    - key: PHOSPHENE_TIMEZONE
      type: STRING
      name: Timezone
      description: IANA timezone used for daily streaks, for example Asia/Shanghai.
  tags:
    - Tool
    - AI
  readme: |-
    # Phosphene

    After all three services are healthy, open the assigned domain and complete the one-time setup.
    Save the AI token shown after setup, then connect your AI client to `https://YOUR_DOMAIN/mcp`
    with `Authorization: Bearer YOUR_AI_TOKEN`.
  services:
    - name: postgresql
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT
      spec:
        source:
          image: postgres:17.5-alpine
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_USER:
            default: phosphene
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_DB:
            default: phosphene
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true
            readonly: true
          DATABASE_URL:
            default: postgresql://phosphene:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/phosphene
            expose: true
            readonly: true
    - name: minio
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/minio.svg
      template: PREBUILT
      spec:
        source:
          image: ghcr.io/obedience-community/phosphene-minio:RELEASE.2025-10-15T17-29-55Z
        command:
          - minio
        args:
          - server
          - /data
          - --console-address
          - :9001
        ports:
          - id: object
            port: 9000
            type: TCP
        volumes:
          - id: data
            dir: /data
        env:
          MINIO_ROOT_USER:
            default: phosphene
            expose: true
          MINIO_ROOT_PASSWORD:
            default: ${PASSWORD}
            expose: true
          MINIO_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          MINIO_PORT:
            default: ${OBJECT_PORT}
            expose: true
            readonly: true
          MINIO_ENDPOINT:
            default: http://${MINIO_HOST}:${MINIO_PORT}
            expose: true
            readonly: true
    - name: phosphene
      icon: https://raw.githubusercontent.com/Obedience-Community/phosphene/main/public/favicon.svg
      template: PREBUILT
      domainKey: PUBLIC_DOMAIN
      dependencies:
        - postgresql
        - minio
      spec:
        source:
          image: ghcr.io/obedience-community/phosphene:1.0.0
        ports:
          - id: web
            port: 8080
            type: HTTP
        env:
          NODE_ENV:
            default: production
          PORT:
            default: "8080"
          PUBLIC_URL:
            default: https://${PUBLIC_DOMAIN}
          PHOSPHENE_SETUP_TOKEN:
            default: ${PHOSPHENE_SETUP_TOKEN}
          PHOSPHENE_TIMEZONE:
            default: ${PHOSPHENE_TIMEZONE}
          SESSION_SECRET:
            default: ${PASSWORD}
          DATABASE_URL:
            default: ${DATABASE_URL}
          STORAGE_DRIVER:
            default: s3
          S3_ENDPOINT:
            default: ${MINIO_ENDPOINT}
          S3_REGION:
            default: us-east-1
          S3_BUCKET:
            default: phosphene-proofs
          S3_ACCESS_KEY:
            default: ${MINIO_ROOT_USER}
          S3_SECRET_KEY:
            default: ${MINIO_ROOT_PASSWORD}
          S3_FORCE_PATH_STYLE:
            default: "true"
        instructions:
          - type: DOMAIN
            title: Open Phosphene
            content: ${PUBLIC_DOMAIN}
          - type: TEXT
            title: MCP endpoint
            content: https://${PUBLIC_DOMAIN}/mcp
  localization:
    zh-CN:
      description: 一位 user 与一位 AI 的私人任务、积分、奖励与陪伴空间。
      variables:
        - key: PUBLIC_DOMAIN
          type: DOMAIN
          name: Phosphene 域名
          description: 为你的私人网站选择域名。
        - key: PHOSPHENE_SETUP_TOKEN
          type: STRING
          name: 一次性 Setup Token
          description: 请填写较长的随机字符串，仅首次设置时使用。
        - key: PHOSPHENE_TIMEZONE
          type: STRING
          name: 时区
          description: 连击按此自然日结算，例如 Asia/Shanghai。
