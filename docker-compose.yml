name: phosphene

services:
  app:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      PHOSPHENE_SETUP_TOKEN: ${PHOSPHENE_SETUP_TOKEN:-}
      PHOSPHENE_MCP_AUTH_MODE: ${PHOSPHENE_MCP_AUTH_MODE:-token}
    volumes:
      - phosphene-data:/data

volumes:
  phosphene-data:
